<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>World Cup 2026 Knockout Bracket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <div class="hero-meta meta">
        <span id="dataSource">Loading...</span>
        <span id="lastUpdated">--</span>
        <span class="refresh-status" id="refreshStatus">Ready</span>
      </div>
    </header>

    <nav class="mobile-round-nav" id="mobileRoundNav" aria-label="Mobile round navigation"></nav>

    <section class="bracket" aria-label="World Cup knockout bracket">
      <div class="side side-left" id="leftSide"></div>

      <div class="center-stage">
        <div class="center-stage-backdrop" aria-hidden="true"></div>
        <div class="center-logo-cluster" aria-label="World Cup 2026 logo cluster">
          <img class="center-logo" src="assets/fifa-world-cup-2026--white.10e0b37b.png" alt="World Cup 2026 logo" />
          <p class="center-subtitle">KNOCKOUT STAGE</p>
        </div>
        <div class="final-card" id="finalCard"></div>
      </div>

      <div class="side side-right" id="rightSide"></div>
    </section>
  </main>

  <template id="matchTemplate">
    <article class="match-card">
      <div class="match-topline">
        <span class="round-name"></span>
        <span class="status-pill"></span>
      </div>
      <div class="team home-team">
        <img class="flag" alt="" />
        <span class="team-name"></span>
        <strong class="score"></strong>
        <span class="team-details"></span>
      </div>
      <div class="team away-team">
        <img class="flag" alt="" />
        <span class="team-name"></span>
        <strong class="score"></strong>
        <span class="team-details"></span>
      </div>
      <div class="penalty-strip" hidden></div>
      <div class="match-footer"></div>
    </article>
  </template>

  <div class="match-modal" id="matchModal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Match details">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close match details">×</button>
      <div id="modalCard"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
